<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Bot — Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root { --c1:#FF6B35; --c2:#7C3AED; --c3:#10B981; --c5:#3B82F6; --err:#EF4444; --dark:#0D0D0D; --card:#141414; --border:rgba(255,255,255,0.08); --text:#F0EEE8; --muted:#888; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:15px; line-height:1.6; }
  .wrap { max-width:960px; margin:0 auto; padding:48px 24px 96px; }
  
  /* Navegación y Botones */
  nav { display:flex; align-items:center; gap:10px; justify-content: flex-end; margin-bottom: 20px; }
  .lang-toggle { display:flex; gap:4px; background:rgba(255,255,255,0.06); border-radius:20px; padding:3px; }
  .lang-btn { border:none; background:transparent; color:#888; padding:6px 12px; border-radius:16px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .lang-btn.active { background:var(--c1); color:#fff; }
  .theme-toggle-btn { width:36px; height:36px; border-radius:50%; border:1px solid rgba(128,128,128,.35); background:rgba(128,128,128,.12); cursor:pointer; display:flex; align-items:center; justify-content:center; }
  
  header { margin-bottom:40px; }
  h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(30px,5vw,44px); letter-spacing:-1.5px; margin-bottom:14px; }
  h1 span { color:var(--c1); }
  .sub { color:var(--muted); max-width:620px; margin-bottom:6px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:28px; margin-bottom:20px; }
  .dropzone { border:1.5px dashed var(--border); border-radius:12px; padding:36px 20px; text-align:center; cursor:pointer; }
  .btn { border:none; padding:10px 20px; border-radius:8px; font-weight:500; cursor:pointer; }
  .btn-primary { background:var(--c1); color:#fff; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div class="wrap">

  <nav>
    <div class="lang-toggle">
      <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="theme-toggle-btn" id="theme-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle></svg></button>
  </nav>

  <header>
    <h1 data-en="🤖 Invoice Bot<br><span>runs right here.</span>" data-es="🤖 Bot de Facturas<br><span>corre aquí mismo.</span>">
      🤖 Invoice Bot<br><span>runs right here.</span>
    </h1>
    <p class="sub" data-en="Drop in one or more PDF invoices to extract data." data-es="Arrastra una o más facturas en PDF para extraer datos.">
      Drop in one or more PDF invoices to extract data.
    </p>
  </header>

  <div class="card">
    <h2 data-en="1. Load invoices" data-es="1. Cargar facturas">1. Load invoices</h2>
    <div class="dropzone" id="dropzone">
      <div class="dz-title" data-en="Drag & drop .pdf" data-es="Arrastra archivos .pdf">Drag & drop .pdf</div>
    </div>
  </div>

  <div id="results" class="hidden"></div>

  <footer>
    Built by Efraín Sebastián · <a href="https://github.com/efrabuilder/invoice-bot" target="_blank">source on GitHub</a>
  </footer>
</div>

<script>
function setLang(lang) {
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  
  document.querySelectorAll('[data-en]').forEach(el => {
    if (el.dataset[lang]) el.innerHTML = el.dataset[lang];
  });
}

// Lógica de tema
const btn = document.getElementById('theme-toggle');
btn.addEventListener('click', () => document.documentElement.classList.toggle('theme-inverted'));
</script>
</body>
</html>
